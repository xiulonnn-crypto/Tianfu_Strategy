name: Compute Data

on:
  push:
    branches: [main]
  schedule:
    # 美股盘中每 30 分钟刷新一次（UTC 13:00-21:30，工作日）：
    # 覆盖 EDT（夏令，行情 13:30-20:00 UTC）与 EST（标准时，行情 14:30-21:00 UTC）。
    # yfinance 在盘中对当日会返回一行「以最新成交价为 Close」的临时行情，
    # `effective_end_date = trading_dates[-1]` 因此会推进到当天，`#returns`
    # 的「数据基准日」从而从收盘前一日前进到今天（盘中实时视图）。
    - cron: '0,30 13-21 * * 1-5'
    # 美东 18:00 (UTC 22:00) 周一至周五，美股收盘后 2h 的终版快照，
    # 保证当日最终收盘价被至少抓取一次（Yahoo 有时延迟数分钟）。
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore raw data from secrets
        env:
          TRADES_B64: ${{ secrets.TRADES_B64 }}
          FUND_RECORDS_B64: ${{ secrets.FUND_RECORDS_B64 }}
          MODEL_STATE_B64: ${{ secrets.MODEL_STATE_B64 }}
        run: |
          mkdir -p data
          echo "$TRADES_B64" | base64 -d > data/trades.json
          echo "$FUND_RECORDS_B64" | base64 -d > data/fund_records.json
          echo "$MODEL_STATE_B64" | base64 -d > data/model_state.json

      - name: Run compute
        run: python3 compute.py

      - name: Commit computed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/computed/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update computed data [skip ci]"
            git push
          fi
