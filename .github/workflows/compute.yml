name: Compute Data

on:
  push:
    paths:
      - 'data/trades.json'
      - 'data/fund_records.json'
      - 'data/model_state.json'
      - 'server.py'
      - 'compute.py'
  schedule:
    # 美东 18:00 (UTC 22:00) 周一至周五，美股收盘后
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run compute
        run: python3 compute.py

      - name: Commit computed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/computed/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update computed data [skip ci]"
            git push
          fi
