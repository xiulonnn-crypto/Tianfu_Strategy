name: Compute Data

on:
  push:
    branches: [main]
  schedule:
    # 美股盘中每 30 分钟刷新一次（UTC 13:00-21:30，工作日）：
    # 覆盖 EDT（夏令，行情 13:30-20:00 UTC）与 EST（标准时，行情 14:30-21:00 UTC）。
    # yfinance 在盘中对当日会返回一行「以最新成交价为 Close」的临时行情，
    # `effective_end_date = trading_dates[-1]` 因此会推进到当天，`#returns`
    # 的「数据基准日」从而从收盘前一日前进到今天（盘中实时视图）。
    - cron: '0,30 13-21 * * 1-5'
    # 美东 18:00 (UTC 22:00) 周一至周五，美股收盘后 2h 的终版快照，
    # 保证当日最终收盘价被至少抓取一次（Yahoo 有时延迟数分钟）。
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compute:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore raw data from secrets
        env:
          TRADES_B64: ${{ secrets.TRADES_B64 }}
          FUND_RECORDS_B64: ${{ secrets.FUND_RECORDS_B64 }}
          MODEL_STATE_B64: ${{ secrets.MODEL_STATE_B64 }}
        run: |
          mkdir -p data
          echo "$TRADES_B64" | base64 -d > data/trades.json
          echo "$FUND_RECORDS_B64" | base64 -d > data/fund_records.json
          echo "$MODEL_STATE_B64" | base64 -d > data/model_state.json

      - name: Run compute
        run: python3 compute.py

      - name: Commit computed data
        # 盘中高频 cron 下（0,30 13-21 * * 1-5），单个 run 的 push 很可能与
        # 并发的用户 push / hook 自动 bump / 相邻的 cron 撞车，被远端以
        # "! [rejected] main -> main (fetch first)" 拒绝。retry + rebase 守
        # 护这条 race，避免一次 race 就丢掉当次数据刷新。
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/computed/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update computed data [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "push succeeded on attempt $attempt"
              exit 0
            fi
            echo "push rejected on attempt $attempt, rebase on origin/main and retry..."
            git fetch origin main
            # --autostash 不需要（工作区已 clean）；-X theirs 在 data/computed/
            # 出现同路径冲突时采用对端版本（生成的 JSON 本质是幂等再计算，
            # 丢掉本地版本不是问题；若冲突发生在非 data/ 路径则 rebase 失败、
            # 进入下一轮重试或最终 fail-fast）
            git pull --rebase -X theirs origin main
            # 小退避避免雷暴式连撞
            sleep $((attempt * 3))
          done
          echo "ERROR: push still rejected after 5 retries, giving up"
          exit 1
